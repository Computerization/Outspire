name = "outspire-push"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "OUTSPIRE_KV"
id = "a8ada3a1a83f412ba0c172ef0fb80c63"

[triggers]
# Daily planner: 22:30 UTC = 06:30 CST — builds one dispatch slot per user
# Dispatch window: 23:30-00:30 UTC = 07:30-08:30 CST — fires the 08:00 start push
# Also covers 07:45 for cancelled-class events
crons = ["30 22 * * *", "* 23 * * *", "0-30 0 * * *"]

[vars]
GITHUB_CALENDAR_URL = "https://raw.githubusercontent.com/Computerization/wfla-events/main"
HOLIDAY_CN_URL = "https://cdn.jsdelivr.net/gh/NateScarlet/holiday-cn@master"
APNS_BUNDLE_ID = "dev.wrye.Outspire"
